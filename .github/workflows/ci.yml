name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: car_ads_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d car_ads_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_DSN: pgsql:host=127.0.0.1;port=5432;dbname=car_ads_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      YII_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_pgsql
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run migrations
        run: php yii migrate/up --interactive=0

      - name: Run tests
        run: composer test
